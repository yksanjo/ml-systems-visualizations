name: Build Visualizations

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        viz: [system-architecture, data-pipeline, training-simulator, edge-deployment, metrics-dashboard, mlops-pipeline]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: visualizations/package.json
    
    - name: Install dependencies
      run: |
        cd visualizations
        npm install
    
    - name: Build ${{ matrix.viz }}
      run: |
        cd visualizations/${{ matrix.viz }}
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.viz }}-build
        path: visualizations/${{ matrix.viz }}/dist

